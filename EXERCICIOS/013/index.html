<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>imagem dinamica</h1>
    <p>tente abrir imagems em outros dispositivos ou em escala menor</p>
    <picture>
        <source media="(max-width:720px )" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width:1050px )" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexivel">
    </picture>
    <h1>Reproduzindo musica</h1>
    <p>vamos aprender a reproduzir audios em html 5</p>
    <audio src="midia/blueprint for the future - Lish Grooves.mp3" controls></audio>

    <p>segunda forma</p>
    <audio preload="metadata" controls>
        <source src="midia/blueprint for the future - Lish Grooves.mp3" type="audio/mp3">
        <p>infelizmente seu audio nao é disponivel <a href="midia/blueprint for the future - Lish Grooves.mp3">clique aqui para baixar o MP3</a></p>
    </audio>

</body>
</html>
