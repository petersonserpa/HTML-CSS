<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplos de Hover</title>
    <style>
        #hover:hover{
            color: blue ;
        }
        div > p{
            display: none;
        }
        div:hover > p{
            display: block;
            text-align: center;
            background-color: rgb(0, 0, 0);
            width: 150px;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Hover</h1>
    <p>passe o mouse sobre o texto abaixo</p>
    <div id="hover">
        Passe o mouse aqui
    <p>TEXTO ESCONDIDO</p>
    </div>
    <p>Fin do exepmplo</p>
</body>
</html>
